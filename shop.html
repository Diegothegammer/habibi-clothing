<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - HABIBI CLOTHING</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
    :root { --black: #0a0a0a; --white: #f8f8f8; --gray: #1f1f1f; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--black); color: var(--white); }

    header { background: rgba(10,10,10,0.95); padding: 18px 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
    .nav-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.3rem; letter-spacing: 4px; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: white; text-decoration: none; font-weight: 500; }
    .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: white; }

    .section { padding: 80px 20px; max-width: 1300px; margin: 0 auto; }
    h2 { text-align: center; font-size: 3rem; margin-bottom: 60px; }

    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

    .product-card {
      background: var(--gray);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.4s;
    }
    .product-card:hover { transform: translateY(-15px); }
    .product-card img { width: 100%; height: 320px; object-fit: cover; }
    .info { padding: 20px; text-align: center; }
    .price { font-size: 1.5rem; font-weight: 600; margin: 10px 0; }
    .add-btn {
      width: 100%;
      background: white;
      color: black;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .mobile-menu {
      display: none; position: fixed; top: 73px; left: 0; width: 100%; background: #1f1f1f;
      padding: 30px 20px; flex-direction: column; gap: 25px; z-index: 999; border-top: 1px solid #333;
    }
    @media (max-width: 768px) { .nav-links { display: none; } .hamburger { display: block; } }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">HABIBI</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div style="display:flex; align-items:center; gap:20px;">
        <a href="cart.html" style="color:white; font-size:1.5rem; position:relative;">
          🛒 <span id="cart-count">0</span>
        </a>
        <div class="hamburger" id="hamburger">☰</div>
      </div>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">Cart</a>
    </div>
  </header>

  <div class="section">
    <h2>All Products</h2>
    <div class="products">
      <!-- Same products as index + more if you want -->
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1622445275576-721325763afe?w=800">
        <div class="info">
          <h3>Desert Sand Hoodie</h3>
          <p class="price">R899</p>
          <button class="add-btn" onclick="addToCart(1, 'Desert Sand Hoodie', 899, 'https://images.unsplash.com/photo-1622445275576-721325763afe?w=800')">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800">
        <div class="info">
          <h3>Signature Logo Tee</h3>
          <p class="price">R449</p>
          <button class="add-btn" onclick="addToCart(2, 'Signature Logo Tee', 449, 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800')">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?w=800">
        <div class="info">
          <h3>Emirates Bomber Jacket</h3>
          <p class="price">R1499</p>
          <button class="add-btn" onclick="addToCart(3, 'Emirates Bomber Jacket', 1499, 'https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?w=800')">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800">
        <div class="info">
          <h3>Sahara Cargo Pants</h3>
          <p class="price">R799</p>
          <button class="add-btn" onclick="addToCart(4, 'Sahara Cargo Pants', 799, 'https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800')">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
      hamburger.textContent = mobileMenu.style.display === 'flex' ? '✕' : '☰';
    });

    function addToCart(id, name, price, img) {
      let cart = JSON.parse(localStorage.getItem('habibiCart')) || [];
      cart.push({ id, name, price, img });
      localStorage.setItem('habibiCart', JSON.stringify(cart));
      alert(`${name} added to cart!`);
      updateCartCount();
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('habibiCart')) || [];
      document.getElementById('cart-count').textContent = cart.length;
    }

    window.onload = updateCartCount;
  </script>
</body>
</html>
