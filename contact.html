<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - HABIBI CLOTHING</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
    :root { --black: #0a0a0a; --white: #f8f8f8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--black); color: var(--white); }
    header { background: rgba(10,10,10,0.95); padding: 18px 20px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #333; }
    .nav-container { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 3px; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: white; text-decoration: none; }

    .section { padding: 120px 20px; max-width: 700px; margin: 0 auto; }
    h1 { text-align: center; font-size: 3rem; margin-bottom: 60px; }
    form { display: flex; flex-direction: column; gap: 20px; }
    input, textarea {
      padding: 16px;
      background: #1f1f1f;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      font-family: inherit;
    }
    button {
      padding: 16px;
      background: white;
      color: black;
      border: none;
      font-weight: 600;
      cursor: pointer;
      border-radius: 50px;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">HABIBI</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <div class="section">
    <h1>Get In Touch</h1>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email Address" required>
      <textarea rows="6" placeholder="Your Message..." required></textarea>
      <button type="button" onclick="alert('Message sent! Habibi, we will reply soon ❤️')">Send Message</button>
    </form>
  </div>
</body>
</html>
