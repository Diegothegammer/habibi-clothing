<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - HABIBI CLOTHING</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');

    :root { --black: #0a0a0a; --white: #f8f8f8; --gray: #1f1f1f; }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--white);
      line-height: 1.6;
    }

    header {
      background: rgba(10,10,10,0.95);
      padding: 18px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #333;
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { 
      font-family: 'Playfair Display', serif; 
      font-size: 2.3rem; 
      letter-spacing: 4px;
    }

    .section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 60px;
    }

    h1 { font-size: 2.8rem; margin-bottom: 30px; text-align: center; grid-column: 1 / -1; }

    .order-summary {
      background: var(--gray);
      padding: 30px;
      border-radius: 16px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .cart-item {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #333;
    }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }

    .total-line {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      font-size: 1.1rem;
    }

    .grand-total {
      font-size: 1.6rem;
      font-weight: 600;
      border-top: 2px solid #444;
      padding-top: 15px;
      margin-top: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    input, select {
      padding: 16px;
      background: #111;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      font-size: 1rem;
    }

    .btn {
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 10px;
    }

    .place-order {
      background: white;
      color: black;
    }

    .cancel-btn {
      background: transparent;
      color: #ff4d6d;
      border: 2px solid #ff4d6d;
    }

    #shipping-info {
      margin: 20px 0;
      padding: 18px;
      background: #111;
      border-radius: 12px;
      border: 1px solid #333;
    }

    @media (max-width: 900px) {
      .section {
        grid-template-columns: 1fr;
        gap: 40px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">HABIBI</div>
      <a href="cart.html" style="color:white; font-size:1.3rem;">← Back to Cart</a>
    </div>
  </header>

  <div class="section">
    <h1>Checkout</h1>

    <!-- Left Side: Form -->
    <div>
      <h2>Shipping Details</h2>
      <form onsubmit="placeOrder(event)">
        <input type="text" id="fullName" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <input type="text" id="address" placeholder="Street Address" required>
        
        <input type="text" id="city" placeholder="City / Suburb (e.g. Pretoria, Midrand, Sandton)" required onkeyup="calculateShipping()">
        
        <select id="province" onchange="calculateShipping()" required>
          <option value="">Select Province</option>
          <option value="Gauteng">Gauteng</option>
          <option value="Western Cape">Western Cape</option>
          <option value="KwaZulu-Natal">KwaZulu-Natal</option>
          <option value="Eastern Cape">Eastern Cape</option>
          <option value="Limpopo">Limpopo</option>
          <option value="Other">Other</option>
        </select>

        <input type="text" id="postal" placeholder="Postal Code" required>

        <!-- Live Shipping Display -->
        <div id="shipping-info" style="display: none;">
          <strong>Shipping Cost: <span id="shipping-cost" style="color:#4ade80;">R0</span></strong><br>
          <small id="shipping-note"></small>
        </div>

        <div style="margin-top: 30px;">
          <button type="button" class="btn cancel-btn" onclick="cancelCheckout()">Cancel Order</button>
          <button type="submit" class="btn place-order">Place Order • Cash on Delivery</button>
        </div>
      </form>
    </div>

    <!-- Right Side: Order Summary -->
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="order-items"></div>
      
      <div class="total-line">
        <span>Subtotal</span>
        <span id="subtotal">R0</span>
      </div>
      <div class="total-line">
        <span id="shipping-label">Shipping</span>
        <span id="shipping-total">R0</span>
      </div>
      
      <div class="grand-total">
        <span>Total</span>
        <span id="grand-total">R0</span>
      </div>
    </div>
  </div>

  <script>
    function calculateShipping() {
      const city = document.getElementById('city').value.trim().toLowerCase();
      const province = document.getElementById('province').value;
      const shippingInfo = document.getElementById('shipping-info');
      const shippingCostEl = document.getElementById('shipping-cost');
      const shippingNote = document.getElementById('shipping-note');
      const shippingLabel = document.getElementById('shipping-label');
      const shippingTotal = document.getElementById('shipping-total');

      let cost = 0;
      let note = "";

      if (city.includes("pretoria") || city === "pta") {
        cost = 60;
        note = "Local Pretoria Delivery (2kg)";
      } 
      else if (province === "Gauteng") {
        cost = 95;
        note = "Gauteng Area Delivery";
      } 
      else if (province !== "") {
        cost = 165;
        note = "National Delivery";
      }

      if (cost > 0) {
        shippingInfo.style.display = "block";
        shippingCostEl.textContent = `R${cost}`;
        shippingNote.textContent = note;
        shippingLabel.textContent = "Shipping";
        shippingTotal.textContent = `R${cost}`;
      } else {
        shippingInfo.style.display = "none";
        shippingTotal.textContent = "R0";
      }

      updateGrandTotal();
    }

    function updateGrandTotal() {
      const subtotal = parseFloat(document.getElementById('subtotal').textContent.replace('R', '')) || 0;
      const shipping = parseFloat(document.getElementById('shipping-total').textContent.replace('R', '')) || 0;
      document.getElementById('grand-total').textContent = `R${subtotal + shipping}`;
    }
