<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HABIBI CLOTHING</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');

    :root {
      --black: #0a0a0a;
      --white: #f8f8f8;
      --gray: #1f1f1f;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--white);
    }

    header {
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      padding: 18px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #333;
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { 
      font-family: 'Playfair Display', serif; 
      font-size: 2.2rem; 
      letter-spacing: 3px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-weight: 500;
    }

    .nav-links a:hover { color: #aaa; }

    .hamburger { display: none; font-size: 1.8rem; cursor: pointer; }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1600585154340-be6161a56a26?w=2000') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content h1 {
      font-size: clamp(3.2rem, 9vw, 6rem);
      letter-spacing: 6px;
    }

    .hero-content p {
      font-size: 1.4rem;
      margin: 20px 0 40px;
    }

    .btn {
      background: transparent;
      color: white;
      padding: 16px 50px;
      border: 2px solid white;
      border-radius: 50px;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .section { padding: 100px 20px; max-width: 1300px; margin: 0 auto; }
    h2 { font-size: 3rem; text-align: center; margin-bottom: 60px; letter-spacing: 2px; }

    footer {
      background: #000;
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid #222;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">HABIBI</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="hamburger" id="hamburger">☰</div>
    </div>
  </header>

  <div class="hero">
    <div class="hero-content">
      <h1>HABIBI</h1>
      <p>Desert Luxury Streetwear</p>
      <a href="shop.html"><button class="btn">Shop Now</button></a>
    </div>
  </div>

  <div class="section">
    <h2>Featured Collection</h2>
    <!-- You can add some product cards here if you want -->
    <p style="text-align:center; font-size:1.3rem;">Visit our <a href="shop.html" style="color:white; text-decoration:underline;">Shop</a> to see full collection.</p>
  </div>

  <footer>
    <p style="font-size:2rem;">HABIBI CLOTHING</p>
    <p>Pretoria • Dubai • Worldwide</p>
  </footer>

</body>
</html>
