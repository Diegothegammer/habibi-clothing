<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HABIBI CLOTHING</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');

    :root { --black: #0a0a0a; --white: #f8f8f8; --gray: #1f1f1f; }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--black);
      color: var(--white);
    }

    header {
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      padding: 18px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #333;
    }

    .nav-container {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { 
      font-family: 'Playfair Display', serif; 
      font-size: 2.3rem; 
      letter-spacing: 4px;
    }

    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: white; text-decoration: none; font-weight: 500; }
    .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: white; }

    /* Hero */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1600585154340-be6161a56a26?w=2000') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-content h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      letter-spacing: 8px;
    }

    .hero-content p {
      font-size: 1.5rem;
      margin: 20px 0 40px;
    }

    .btn {
      background: transparent;
      color: white;
      padding: 18px 55px;
      border: 2px solid white;
      border-radius: 50px;
      font-size: 1.15rem;
      cursor: pointer;
    }

    .btn:hover { background: white; color: black; }

    .section { padding: 100px 20px; max-width: 1300px; margin: 0 auto; }
    h2 { font-size: 3rem; text-align: center; margin-bottom: 60px; letter-spacing: 3px; }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .product-card {
      background: var(--gray);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s;
    }

    .product-card:hover { transform: translateY(-15px); }

    .product-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .info { padding: 20px; text-align: center; }
    .price { font-size: 1.5rem; font-weight: 600; margin: 10px 0; }

    .add-btn {
      width: 100%;
      background: white;
      color: black;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 73px;
      left: 0;
      width: 100%;
      background: #1f1f1f;
      padding: 30px 20px;
      flex-direction: column;
      gap: 25px;
      z-index: 999;
      border-top: 1px solid #333;
    }

    .mobile-menu a { color: white; text-decoration: none; font-size: 1.3rem; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <div class="logo">HABIBI</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div style="display:flex; align-items:center; gap:20px;">
        <a href="cart.html" style="color:white; font-size:1.5rem; position:relative; text-decoration:none;">
          🛒
          <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:#c41e3a; color:white; font-size:0.75rem; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
        </a>
        <div class="hamburger" id="hamburger">☰</div>
      </div>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html">Cart</a>
    </div>
  </header>

  <div class="hero">
    <div class="hero-content">
      <h1>HABIBI</h1>
      <p>Desert Luxury • Street Royalty</p>
      <a href="shop.html"><button class="btn">Shop The Collection</button></a>
    </div>
  </div>

  <div class="section">
    <h2>Featured Drops</h2>
    <div class="products">
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1622445275576-721325763afe?w=800" alt="Hoodie">
        <div class="info">
          <h3>Desert Sand Hoodie</h3>
          <p class="price">R899</p>
          <button class="add-btn" onclick="addToCart(1, 'Desert Sand Hoodie', 899, 'https://images.unsplash.com/photo-1622445275576-721325763afe?w=800')">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" alt="Tshirt">
        <div class="info">
          <h3>Signature Logo Tee</h3>
          <p class="price">R449</p>
          <button class="add-btn" onclick="addToCart(2, 'Signature Logo Tee', 449, 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800')">Add to Cart</button>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?w=800" alt="Jacket">
        <div class="info">
          <h3>Emirates Bomber Jacket</h3>
          <p class="price">R1499</p>
          <button class="add-btn" onclick="addToCart(3, 'Emirates Bomber Jacket', 1499, 'https://images.unsplash.com/photo-1586790170083-2f9ceadc732d?w=800')">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <footer style="background:#000; text-align:center; padding:60px 20px;">
    <p style="font-size:2rem;">HABIBI CLOTHING</p>
    <p>Pretoria • Dubai • Worldwide</p>
  </footer>

  <script>
    // Mobile Menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      mobileMenu.style.display = mobileMenu.style.display === 'flex' ? 'none' : 'flex';
      hamburger.textContent = mobileMenu.style.display === 'flex' ? '✕' : '☰';
    });

    // Cart System
    function addToCart(id, name, price, img) {
      let cart = JSON.parse(localStorage.getItem('habibiCart')) || [];
      cart.push({ id, name, price, img });
      localStorage.setItem('habibiCart', JSON.stringify(cart));
      
      alert(`${name} added to cart!`);
      updateCartCount();
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('habibiCart')) || [];
      const countEl = document.getElementById('cart-count');
      if (countEl) countEl.textContent = cart.length;
    }

    // Initialize
    window.onload = updateCartCount;
  </script>
</body>
</html>
